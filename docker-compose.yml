services:
  vote-app:
    build:
      context: ./vote-app
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./vote-app:/app
      - vote-app-node-modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    stdin_open: true
    tty: true

  admin-app:
    build:
      context: ./admin-app
      dockerfile: Dockerfile
    ports:
      - "5174:5174"
    volumes:
      - ./admin-app:/app
      - admin-app-node-modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    stdin_open: true
    tty: true

  firebase-cli:
    build:
      context: ./firebase
      dockerfile: Dockerfile
    volumes:
      - .:/workspace
      - firebase-cli-config:/root/.config
    stdin_open: true
    tty: true

volumes:
  vote-app-node-modules:
  admin-app-node-modules:
  firebase-cli-config:
